<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513"/>
      <stop offset="100%" style="stop-color:#D2691E"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="url(#shine)"/>
  
  <!-- Basket/weave pattern representing handmade -->
  <!-- Main basket shape -->
  <ellipse cx="32" cy="42" rx="18" ry="10" fill="#F5DEB3" opacity="0.95"/>
  <rect x="14" y="32" width="36" height="12" rx="3" fill="#DEB887"/>
  
  <!-- Weave lines horizontal -->
  <line x1="14" y1="36" x2="50" y2="36" stroke="#8B4513" stroke-width="1.2" opacity="0.6"/>
  <line x1="14" y1="40" x2="50" y2="40" stroke="#8B4513" stroke-width="1.2" opacity="0.6"/>
  
  <!-- Weave lines vertical -->
  <line x1="20" y1="32" x2="20" y2="44" stroke="#8B4513" stroke-width="1.2" opacity="0.5"/>
  <line x1="26" y1="32" x2="26" y2="44" stroke="#8B4513" stroke-width="1.2" opacity="0.5"/>
  <line x1="32" y1="32" x2="32" y2="44" stroke="#8B4513" stroke-width="1.2" opacity="0.5"/>
  <line x1="38" y1="32" x2="38" y2="44" stroke="#8B4513" stroke-width="1.2" opacity="0.5"/>
  <line x1="44" y1="32" x2="44" y2="44" stroke="#8B4513" stroke-width="1.2" opacity="0.5"/>
  
  <!-- Basket handle -->
  <path d="M22 32 Q32 18 42 32" fill="none" stroke="#DEB887" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M22 32 Q32 18 42 32" fill="none" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3,3"/>
  
  <!-- Small flower/star on top representing handmade craft -->
  <circle cx="32" cy="17" r="3.5" fill="#E74C3C"/>
  <circle cx="26" cy="20" r="2.5" fill="#E67E22"/>
  <circle cx="38" cy="20" r="2.5" fill="#E67E22"/>
  <circle cx="32" cy="17" r="1.5" fill="#FFD700"/>
  
  <!-- Bottom ellipse for 3D effect -->
  <ellipse cx="32" cy="44" rx="18" ry="4" fill="#C4954A" opacity="0.5"/>
</svg>
